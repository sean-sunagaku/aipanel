name: Source Comments

on:
  push:
    paths:
      - "src/**/*.ts"
      - "scripts/**/*.mjs"
      - "eslint.config.js"
      - "package.json"
      - ".github/workflows/source-comments.yml"
      - "docs/source-comment-contract.md"
  pull_request:
    paths:
      - "src/**/*.ts"
      - "scripts/**/*.mjs"
      - "eslint.config.js"
      - "package.json"
      - ".github/workflows/source-comments.yml"
      - "docs/source-comment-contract.md"

permissions:
  contents: read

jobs:
  source-comments:
    name: Source Comment Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run check:docs
      - run: pnpm run check:usage
      - run: pnpm run docs:context
      - uses: actions/upload-artifact@v4
        with:
          name: symbol-context
          path: reports/symbol-context.json
