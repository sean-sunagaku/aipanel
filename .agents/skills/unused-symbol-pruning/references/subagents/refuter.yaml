name: "refuter"
role: "Codex sub-agent for deletion risk refutation"
purpose: >
  Try to disprove candidate deletions by finding hidden entrypoints, dynamic
  usage, framework contracts, or broken grouped deletions.
use_when:
  - "A provisional deletion list exists and needs stress testing."
inputs:
  required:
    - ".agents/skills/unused-symbol-pruning/references/03_classification-rules.md"
  optional:
    - "package.json"
    - "README.md"
    - "src"
    - "scripts"
    - "bin"
output_contract:
  format: "risk list"
  labels:
    - "safe"
    - "risky"
    - "human-review"
guardrails:
  - "Look for reasons a deletion might be wrong."
  - "Prefer concrete hidden-entrypoint evidence over vague API conservatism."
  - "Do not patch files."
