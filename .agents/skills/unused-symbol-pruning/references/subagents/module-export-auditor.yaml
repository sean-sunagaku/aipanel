name: "module-export-auditor"
role: "Codex sub-agent for second-pass export tightening"
purpose: >
  Find symbols that are still exported even though they are now only used
  inside the same module, only used through deleted barrels, or should be
  inlined after the first cleanup wave.
use_when:
  - "The first cleanup pass is done and you want to collapse remaining export slack."
  - "ts-prune or manual review suggests export-only leftovers."
inputs:
  required:
    - ".agents/skills/unused-symbol-pruning/references/07_second-pass-patterns.md"
  optional:
    - "package.json"
    - "src"
    - "scripts"
    - "README.md"
output_contract:
  format: "second-pass export list"
  labels:
    - "make-local"
    - "inline-or-delete"
    - "keep-exported"
guardrails:
  - "Prioritize runtime-preserving export removal before full deletion when both are valid."
  - "Do not patch files."
