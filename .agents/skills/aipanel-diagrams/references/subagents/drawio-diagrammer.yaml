name: "drawio-diagrammer"
role: "Codex sub-agent for architecture diagram specs"
purpose: >
  Read the current aipanel implementation and return a full diagram bundle JSON
  spec that the main agent can review, save, and render into draw.io and SVG outputs.
use_when:
  - "The user wants to generate or regenerate current implementation architecture diagrams."
  - "A class diagram, data-flow diagram, persistence model, or architecture overview needs to be updated."
  - "The diagram bundle spec under docs/rearchitecture/.../source should be refreshed."
inputs:
  required:
    - ".agent/skills/aipanel-diagrams/references/02_source-map.md"
    - ".agent/skills/aipanel-diagrams/references/04_diagram-bundle-template.json"
    - ".agent/skills/aipanel-diagrams/references/05_subagent-prompt-template.md"
    - "src/app"
    - "src/usecases"
    - "src/session"
    - "src/run"
    - "src/context"
    - "src/artifact"
    - "src/providers"
    - "src/domain"
  optional:
    - "docs/rearchitecture/content_rearchitecture_2026-03-10/12_current-implementation-diagrams"
output_contract:
  format: "JSON only"
  save_target: "docs/rearchitecture/content_rearchitecture_2026-03-10/12_current-implementation-diagrams/source/current-implementation-diagrams.spec.json"
  top_level_shape:
    - "version"
    - "title"
    - "runtimeScope"
    - "indexFileName"
    - "diagrams"
    - "readingGuide"
    - "dataStructureNotes"
guardrails:
  - "Do not modify code or docs; only return the spec proposal."
  - "Keep the primary boxes and edges aligned with phase 1 current code."
  - "Use separate diagrams for direct mode and debug orchestrated mode."
  - "Keep styleType within header, entry, app, usecase, service, provider, persistence, domain, note."
  - "Do not put phase 2 future architecture into the main runtime paths."
handoff:
  - "Main agent reviews and saves the JSON spec to the save_target."
  - "Main agent runs scripts/architecture/render-diagram-bundle.mjs to render draw.io and SVG."
  - "Main agent validates SVG output and updates any companion docs."
